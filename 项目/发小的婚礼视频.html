<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">

  <style>


    /* 单个菜单样式（保留之前的选中线效果） */
    .nav-links a {
    color: rgba(0, 0, 0, 0.65);
    text-decoration: none;
    font-size: 16px;
    font-weight: 400;
    position: relative;
    padding: 8px 0; /* 预留选中线空间 */
    transition: color 0.3s;
    }

    /* 选中线效果（保持之前的逻辑：文字下方8px、同宽） */
    .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background-color: #000000;
    transition: width 0.3s ease;
    }

    /* 选中菜单样式（核心区分） */
    .nav-links a.active {
    color: #000000; /* 选中文字强调色（如金色，与黑色背景强对比） */
    font-weight: 500; /* 选中字体加粗（700=bold），明显突出 */
    }

    .nav-links a.active::after {
    width: 100%; /* 选中时同宽 */
    }
    .nav-links a:hover::after {
    width: 100%; /* hover时显示线（可选） */
    }
    .nav-links a:hover {
    color: #1f1f1f;
    }



    body {
    background-color: #ffffff; /* 背景 */
    color: #222; /* 全局默认文字白色，确保可读性 */
    font-weight: 400;
    }



    .frame-1 {
    position: relative; /* 作为子元素绝对定位的参考 */
    width: 1280px;
    margin: 0 auto; /* 居中显示 */
    min-height: 400px; /* 图片加载失败时兜底高度 */
    background: #ffffff; /* 图片加载失败时的背景色 */
    }


    /* 封面样式 */
    .image {
    width: 1280px;
    height: auto; /* 自适应高度，避免变形 */
    display: block; /* 去除图片默认的行内空白 */
    margin: 120px auto;
    }


    .frame-2 {
    max-width: 960px;
    margin: 20px auto;
    padding: 0;
    }
    

    /* 文字区域 */
    .frame-3 {
    width: 100%;
    max-width: 960px;
    margin: 0;
    gap: 16px;
    padding: 240px 0 0 0;
    }
    

    .text-wrapper {
    font-size: 48px;
    width: 100%;
    line-height:150%
    font-weight: 600;
    color: #333; /* 白色标题，突出名字 */
    margin-bottom: -10px;
    }

    .element {
    font-size: 14px;
    color: #666; /* 浅灰文字，黑色背景下可读性强 */
    font-weight: 300;
    max-width: 1280px; /* 限制文字宽度，避免换行太丑 */
    margin: 0 0 0 0;
    }

    .element-2 {
    font-size: 18px;
    color: #555; /* 浅灰文字，黑色背景下可读性强 */
    font-weight: 300;
    max-width: 1280px; /* 限制文字宽度，避免换行太丑 */
    margin: 0 0 0 0;
    }


    /* 页脚样式 */
    .footer {
    padding-top: 80px;
    padding-right: 0px;
    padding-bottom: 60px;
    padding-left: 0px;
    background-color: #ffffff;
    color: #333;
    text-align: center;
    }
    .footer p {
    font-size: 12px;
    line-height:200%;
    }


    /* 仅正文容器样式 */
    .blog-content {
        max-width: 960px; /* 作品阅读宽度 */
        margin: 160px auto;   /* 居中显示 */
        padding: 0;
        line-height: 1.8; /* 舒适的行高 */
        font-size: 16px;
    }

    /* 一级标题 */
    .blog-content h1 {
        font-size: 28px;
        color: #333;
        margin: 120px 0 24px 0;
        line-height: 1.3;
        font-weight: 500;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
    }

    /* 二级标题 */
    .blog-content h2 {
        font-size: 22px;
        color: #333;
        margin: 48px 0 24px 0;
        font-weight: 400;
        position: relative;
        padding-left: 0px;
    }

    /* 三级标题（可选） */
    .blog-content h3 {
        font-size: 18px;
        color: #222;
        margin: 25px 0 12px 0;
        font-weight: 400;
    }

    /* 正文段落 */
    .blog-content p {
        margin: 0 0 24px 0;
        font-weight: 300;
        text-align: justify; /* 两端对齐，提升阅读体验 */
    }


    /* 移动端适配 */
    @media (max-width: 768px) {
        .blog-content {
            padding: 20px 15px;
            font-size: 15px;
        }
        .blog-content h1 {
            font-size: 24px;
        }
        .blog-content h2 {
            font-size: 20px;
        }
    }
</style>

</head>
