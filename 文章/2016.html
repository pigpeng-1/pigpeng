<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pigpeng</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">

  <style>
    .nav-links a {
      color: rgba(0, 0, 0, 0.65);
      text-decoration: none;
      font-size: 16px;
      font-weight: 400;
      position: relative;
      padding: 8px 0;
      transition: color 0.3s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 1px;
      background-color: #000000;
      transition: width 0.3s ease;
    }

    .nav-links a.active {
      color: #000000;
      font-weight: 500;
    }

    .nav-links a.active::after {
      width: 100%;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a:hover {
      color: #1f1f1f;
    }

    body {
      background-color: #ffffff;
      color: #222;
      font-weight: 400;
    }

    .frame-1 {
      position: relative;
      width: 1440px;
      margin: 0 auto;
      min-height: 400px;
      background: #ffffff;
    }

    .image {
      width: 1440px;
      height: auto;
      display: block;
      margin: 120px auto;
    }

    .frame-2 {
      max-width: 1000px;
      margin: 20px auto;
      padding: 0;
    }

    .frame-3 {
      width: 100%;
      max-width: 1000px;
      margin: 0;
      gap: 16px;
      padding: 240px 0 0 0;
    }

    .text-wrapper {
      font-size: 48px;
      width: 100%;
      line-height: 150%;
      font-weight: 600;
      color: #333;
      margin-bottom: -10px;
    }

    .element {
      font-size: 14px;
      color: #666;
      font-weight: 300;
      max-width: 1280px;
      margin: 0;
    }

    .element-2 {
      font-size: 18px;
      color: #555;
      font-weight: 300;
      max-width: 1280px;
      margin: 0;
    }

    .footer {
      padding-top: 80px;
      padding-right: 0;
      padding-bottom: 60px;
      padding-left: 0;
      background-color: #ffffff;
      color: #333;
      text-align: center;
    }

    .footer p {
      font-size: 12px;
      line-height: 200%;
    }

    .blog-content {
      max-width: 800px;
      margin: 160px auto;
      padding: 0;
      line-height: 1.8;
      font-size: 16px;
    }

    .blog-content h1 {
      font-size: 28px;
      color: #333;
      margin: 120px 0 24px 0;
      line-height: 1.3;
      font-weight: 500;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    .blog-content h2 {
      font-size: 22px;
      color: #333;
      margin: 48px 0 24px 0;
      font-weight: 400;
      position: relative;
      padding-left: 0;
    }

    .blog-content p {
      margin: 0 0 24px 0;
      font-weight: 300;
      text-align: justify;
    }

    .blog-content ul {
      margin: 0 0 18px 30px;
      padding-left: 10px;
    }

    .blog-content li {
      margin: 0 0 8px 0;
    }

    .blog-content blockquote {
      border-left: 4px solid #4285f4;
      padding: 10px 15px;
      background-color: #f9f9f9;
      margin: 20px 0;
      color: #666;
    }

    @media (max-width: 768px) {
      .blog-content {
        padding: 20px 15px;
        font-size: 15px;
      }

      .blog-content h1 {
        font-size: 24px;
      }

      .blog-content h2 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="../index.html" class="logo">
      <img src="../images/logo.png" alt="pigpeng" class="logo-img">
    </a>
    <div class="nav-links">
      <a href="../index.html">主页</a>
      <a href="../projects.html">项目</a>
      <a href="../article.html" class="active">文章</a>
      <a href="../photography.html">定格</a>
      <a href="../black.html">黑洞</a>
    </div>
  </nav>


  <div class="frame-1">
    <img class="image" src="https://pigpeng-web.oss-cn-hangzhou.aliyuncs.com/images/article/%E6%8D%A1%E8%B4%9D%E5%A3%B3%E7%9A%84%E7%94%B7%E5%AD%A9/%E6%AD%A3%E5%9C%A8%E4%B9%A6%E5%86%99%E4%B8%AD.png" alt="摄影" />
  </div>

  <script src="../js/main.js"></script>
</body>
</html>
