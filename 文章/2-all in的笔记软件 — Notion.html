    /* 单个菜单样式（保留之前的选中线效果） */
    .nav-links a {
    color: rgba(0, 0, 0, 0.65);
    text-decoration: none;
    font-size: 16px;
    font-weight: 400;
    position: relative;
    padding: 8px 0; /* 预留选中线空间 */
    transition: color 0.3s;
    }

    /* 选中线效果（保持之前的逻辑：文字下方8px、同宽） */
    .nav-links a::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 0;
    height: 1px;
    background-color: #000000;
    transition: width 0.3s ease;
    }

    /* 选中菜单样式（核心区分） */
    .nav-links a.active {
    color: #000000; /* 选中文字强调色（如金色，与黑色背景强对比） */
    font-weight: 500; /* 选中字体加粗（700=bold），明显突出 */
    }

    .nav-links a.active::after {
    width: 100%; /* 选中时同宽 */
    }
    .nav-links a:hover::after {
    width: 100%; /* hover时显示线（可选） */
    }
    .nav-links a:hover {
    color: #1f1f1f;
    }



    body {
    background-color: #ffffff; /* 背景 */
    color: #222; /* 全局默认文字白色，确保可读性 */

    .frame-1 {
    position: relative; /* 作为子元素绝对定位的参考 */
    width: 1280px;

    /* 页脚样式 */

    text-align: center;

    }


    /* 仅正文容器样式 */
    .blog-content {
        max-width: 960px; /* 作品阅读宽度 */
        margin: 160px auto;   /* 居中显示 */
        padding: 0;
        line-height: 1.8; /* 舒适的行高 */
        font-size: 16px;
    }

    /* 一级标题 */
    .blog-content h1 {
        font-size: 28px;
        color: #333;
        margin: 120px 0 24px 0;
        line-height: 1.3;
        font-weight: 500;
        border-bottom: 1px solid #eee;

    /* 二级标题 */

    /* 正文段落 */

        text-align: justify; /* 两端对齐，提升阅读体验 */
